  #
  #   restart: unless-stopped

volumes:
  swarm_api:
  swarm_logs:
  swarm_shared:
  swarm_lead:
  swarm_worker_1:
  swarm_worker_2:
  swarm_content_writer:
  swarm_content_reviewer:
  swarm_content_strategist:
  # Uncomment if using the pi-worker service above
  # swarm_pi_worker:
  # swarm_pi_agent:
